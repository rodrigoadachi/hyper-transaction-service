name: CI

# Runs on every push and every PR targeting main.
# deploy.yml listens to workflow_run on this workflow — if any job here fails,
# the deploy pipeline is blocked automatically.
on:
  push:
  pull_request:
    branches:
      - main

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── Required GitHub Actions configuration ────────────────────────────────────
#
# Settings → Secrets and variables → Actions → Secrets (encrypted):
#   CI_JWT_PRIVATE_KEY       ECDSA P-256 private key, base64-encoded
#   CI_JWT_PUBLIC_KEY        ECDSA P-256 public key, base64-encoded
#   CI_PEPPER                Random string >= 32 chars
#   CI_REGISTRATION_SECRET   Random string >= 32 chars
#   CI_POSTGRES_PASSWORD     Password for the CI Postgres instance
#
# Settings → Secrets and variables → Actions → Variables (plain text):
#   CI_POSTGRES_USER         e.g. ci_user
#   CI_POSTGRES_DB           e.g. hyper_test
#   CI_API_PORT              e.g. 3333

jobs:
  # ─── Dependency Audit ───────────────────────────────────────────────────────
  audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (fail on high/critical)
        run: pnpm audit --audit-level=high --recursive

  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm turbo run lint

      - name: Type check
        run: pnpm turbo run check-types

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

  # ─── Tests (API) — unit + e2e, coverage ≥ 80 % ───────────────────────────
  # Web has no tests; only the API is validated here.
  # Jest coverageThreshold is configured in apps/api/package.json — if any
  # metric (statements/branches/functions/lines) falls below 80 % this job
  # exits with a non-zero code and blocks the deploy pipeline.
  test:
    name: Test API (coverage ≥ 80%)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ vars.CI_POSTGRES_USER }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB }}
          POSTGRES_PORT: "5432"
        run: pnpm --filter api run db:migrate

      - name: Unit tests with coverage (threshold enforced by Jest config)
        env:
          PORT: ${{ vars.CI_API_PORT }}
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB }}
          POSTGRES_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_PRIVATE_KEY: ${{ secrets.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.CI_JWT_PUBLIC_KEY }}
          PEPPER: ${{ secrets.CI_PEPPER }}
          REGISTRATION_SECRET: ${{ secrets.CI_REGISTRATION_SECRET }}
        run: pnpm --filter api run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

      - name: E2E tests
        env:
          PORT: ${{ vars.CI_API_PORT }}
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_USER: ${{ vars.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.CI_POSTGRES_DB }}
          POSTGRES_PORT: "5432"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_PRIVATE_KEY: ${{ secrets.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.CI_JWT_PUBLIC_KEY }}
          PEPPER: ${{ secrets.CI_PEPPER }}
          REGISTRATION_SECRET: ${{ secrets.CI_REGISTRATION_SECRET }}
        run: pnpm --filter api run test:e2e
